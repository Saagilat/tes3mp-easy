    #   1. Uncomment the desired location blocks below
    #   2. Uncomment the `nginx` AND/OR `export` services in docker-compose.yml
    #   3. Run: docker compose up -d --build
    #
    # /get-mods is served via a symlink (current.tar.gz) created by deploy_mods.sh.
    # /get-players and /get-world are proxied to the export service.

    #UNCOMMENT_TO_ENABLE_GET_MODS#
    #location /get-mods {
    #    limit_req zone=mods burst=1 nodelay;
    #    alias /usr/share/nginx/html/mods/current.tar.gz;
    #    default_type application/gzip;
    #}

    #UNCOMMENT_TO_ENABLE_GET_PLAYERS#
    #location /get-players {
    #    limit_req zone=players burst=1 nodelay;
    #    proxy_pass http://export:5000/get-players;
    #}

    #UNCOMMENT_TO_ENABLE_GET_WORLD#
    #location /get-world {
    #    limit_req zone=world burst=1 nodelay;
    #    proxy_pass http://export:5000/get-world;
    #}

    location / {
        return 404;
    }
}