limit_req_zone $binary_remote_addr zone=mods:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=players:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=world:10m rate=5r/m;

server {
    listen 80;
    server_name _;

    # ⚠️ ALL ENDPOINTS DISABLED BY DEFAULT
