limit_req_zone $binary_remote_addr zone=mods:10m rate=5r/m;

server {
    listen 80;
    server_name _;

    # ⚠️ ALL ENDPOINTS DISABLED BY DEFAULT
    #
    # To enable endpoints:
    #   1. Uncomment the desired location block below
    #   2. Uncomment the `nginx` service in docker-compose.yml
    #   3. Run: docker compose up -d --build
    #
    # /get-mods is a static file served by nginx.

    #UNCOMMENT_TO_ENABLE_GET_MODS#
    #location /get-mods {
    #    limit_req zone=mods burst=1 nodelay;
    #    alias /usr/share/nginx/html/mods.tar.gz;
    #    default_type application/gzip;
    #}

    location / {
        return 404;
    }
}