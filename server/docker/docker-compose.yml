name: tes3mp

services:
  tes3mp:
    build:
      context: .
      dockerfile: tes3mp.dockerfile
    ports:
      - "25565:25565/udp"
    stop_grace_period: 30s
    restart: unless-stopped
    volumes:
      # Group 1: players
      - ./players:/tes3mp/server/data/player
      # Group 2: world (5 sub-mounts)
      - ./world/cell:/tes3mp/server/data/cell
      - ./world/world:/tes3mp/server/data/world
      - ./world/map:/tes3mp/server/data/map
      - ./world/recordstore:/tes3mp/server/data/recordstore
      - ./world/custom:/tes3mp/server/data/custom
      # Group 3: mods
      - ./mods/plugins:/tes3mp/data-plugins
      - ./mods/scripts:/tes3mp/server/scripts/custom
      # Group 4: configs
      - ./configs/tes3mp-server-default.cfg:/tes3mp/tes3mp-server-default.cfg
      - ./configs/banlist.json:/tes3mp/server/data/banlist.json
      - ./configs/config.lua:/tes3mp/server/scripts/config.lua
      - ./configs/customScripts.lua:/tes3mp/server/scripts/customScripts.lua

  nginx:
    image: nginx:alpine
    ports:
      - "8085:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./backups/mods:/usr/share/nginx/html/mods:ro
    restart: unless-stopped

  export:
    build:
      context: .
      dockerfile: export.dockerfile
    volumes:
      - ./players:/mnt/characters:ro
      - ./world/cell:/mnt/world/cell:ro
      - ./world/world:/mnt/world/world:ro
      - ./world/map:/mnt/world/map:ro
      - ./world/recordstore:/mnt/world/recordstore:ro
      - ./world/custom:/mnt/world/custom:ro
      - ./backups:/mnt/backups:rw
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
