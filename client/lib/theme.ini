; TES3MP Easy menu theme configuration
; Only two colors are used:
;   THEME_LABEL  — borders, headers, labels (Host/Server/Mods), info/ok messages
;   THEME_ACCENT — highlighted menu item, warnings
;
; Color values are ANSI color numbers (see ANSI escape codes):
;   30-37 standard foreground, 90-97 bright foreground
;   40-47 standard background, 100-107 bright background
;
; Example: 36 = cyan, 33 = yellow, 32 = green, 35 = magenta

THEME_MENU_WIDTH = 64
THEME_LABEL = 36
THEME_ACCENT = 33

; Border characters (only ══ style)
THEME_BORDER_TL = ╭
THEME_BORDER_TR = ╮
THEME_BORDER_BL = ╰
THEME_BORDER_BR = ╯
THEME_BORDER_H = ─
THEME_BORDER_V = │
